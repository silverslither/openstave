<!DOCTYPE html>
<html lang="">

<head>
    <meta charset="utf-8">
    <title>OpenStave SMB2J Renderer</title>
    <link rel="stylesheet" href="/common/style.css">
    <script type="module" src="/common/main.js"></script>
    <script>
        window.__game = "smb2j";
    </script>
</head>

<body>
    <div id="renderer">
        <div id="screen"></div>
    </div>
    <div id="controls">
        <button id="play">Pause</button>
        <span id="frames-left">-------</span>
        <input type="range" min="0" max="0">
        <span id="frames-right">-------</span>
        <button id="menu-toggle">Menu</button>
        <div id="menu">
            <button id="mouse-help">Mouse Controls Help</button>
            <button id="ahc">Auto-Hide Controls</button>
            <button id="lb">Show/Hide Leaderboard</button>
            <button id="category">Show/Hide Category</button>
            <button id="float">Show/Hide Float</button>
            <button id="copy-ss">Copy Screenshot</button>
            <button id="save-ss">Save Screenshot</button>
            <button id="recorder-open">Launch Recorder</button>
        </div>
        <div id="recorder">
            <button id="recorder-help">Recorder Help</button>
            <span id="size" style="margin-left: 6px; margin-right: 6px;">Size: </span>
            <button id="record">Start Recording</button>
            <button id="recorder-close">Close Recorder</button>
        </div>
    </div>
</body>

</html>
